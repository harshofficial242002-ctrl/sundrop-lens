<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sundrop Lens</title>
<style>
  :root {
    --sd-blue: #1B4DA1;
    --sd-blue-dark: #123870;
    --sd-yellow: #FFD200;
    --sd-orange: #F5A623;
    --text-dark: #222222;
    --text-muted: #6b6b6b;
    --white: #FFFFFF;
    --bg: #F7F8FA;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: 'Segoe UI', Calibri, Arial, sans-serif; }
  body { background: var(--bg); color: var(--text-dark); display: flex; flex-direction: column; }

  #header {
    background: var(--white);
    border-bottom: 1px solid #e8e8e8;
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  #header .brand { display: flex; align-items: center; gap: 10px; }
  #header .brand-name { font-size: 17px; font-weight: 700; color: var(--sd-blue-dark); }
  #session-info { font-size: 12px; color: var(--text-muted); }
  #logout-btn {
    background: transparent; border: 1px solid var(--sd-blue); color: var(--sd-blue);
    padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  #logout-btn:hover { background: var(--sd-blue); color: var(--white); }
  #header-right { display: flex; align-items: center; gap: 16px; }

  #landing { flex: 1; padding: 40px 28px; max-width: 980px; margin: 0 auto; width: 100%; }
  #welcome { margin-bottom: 30px; }
  #welcome h2 { font-size: 21px; margin: 0 0 4px; color: var(--text-dark); }
  #welcome p { margin: 0; font-size: 13.5px; color: var(--text-muted); }

  .section-label {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--sd-blue); margin: 0 0 12px;
  }

  /* Continue-where-you-left-off: contrast + smart-default per research */
  #continue-card {
    display: none;
    background: linear-gradient(135deg, var(--sd-blue), var(--sd-blue-dark));
    color: var(--white);
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 32px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
  }
  #continue-card:hover { opacity: 0.95; }
  #continue-card .cc-left h3 { margin: 0 0 4px; font-size: 16px; }
  #continue-card .cc-left p { margin: 0; font-size: 12.5px; opacity: 0.85; }
  #continue-card .cc-arrow { font-size: 20px; }

  #report-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
  }
  .report-card {
    background: var(--white);
    border: 1px solid #e6e6e6;
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    text-align: left;
    position: relative;
    transition: box-shadow 0.15s ease, transform 0.1s ease, border-color 0.15s ease;
  }
  .report-card:hover { box-shadow: 0 8px 24px rgba(27,77,161,0.12); border-color: var(--sd-blue); transform: translateY(-2px); }
  .report-card .icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--sd-yellow); color: var(--sd-blue-dark);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; margin-bottom: 12px;
  }
  .report-card h3 { margin: 0 0 6px; font-size: 15px; color: var(--text-dark); }
  .report-card p { margin: 0; font-size: 12px; color: var(--text-muted); line-height: 1.4; }
  .pin-btn {
    position: absolute; top: 14px; right: 14px;
    background: none; border: none; cursor: pointer; font-size: 15px;
    color: #d0d0d0; padding: 2px;
  }
  .pin-btn.pinned { color: var(--sd-orange); }

  #empty-state { color: var(--text-muted); font-size: 13.5px; padding: 24px 0; }

  /* ---- Report viewer ---- */
  #viewer { display: none; flex: 1; flex-direction: column; }
  #viewer-bar {
    padding: 10px 24px; background: var(--white); border-bottom: 1px solid #e8e8e8;
    display: flex; align-items: center; gap: 14px;
  }
  #back-btn {
    background: transparent; border: 1px solid var(--sd-blue); color: var(--sd-blue);
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  #back-btn:hover { background: var(--sd-blue); color: var(--white); }
  #viewer-title { font-size: 14px; font-weight: 600; color: var(--text-dark); }
  #frame-wrap { flex: 1; }
  #report-iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>

  <div id="header">
    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 52 52" aria-label="Sundrop Lens">
        <circle cx="26" cy="26" r="14" fill="#FFD200"/>
        <path d="M26 16 C31 24 33 27 33 31 A7 7 0 0 1 19 31 C19 27 21 24 26 16 Z" fill="#1B4DA1"/>
      </svg>
      <span class="brand-name">Sundrop Lens</span>
    </div>
    <div id="header-right">
      <span id="session-info"></span>
      <button id="logout-btn">Log out</button>
    </div>
  </div>

  <div id="landing">
    <div id="welcome">
      <h2 id="welcome-title"></h2>
      <p id="welcome-sub"></p>
    </div>

    <div id="continue-card">
      <div class="cc-left">
        <p style="text-transform:uppercase;letter-spacing:0.8px;font-size:11px;margin-bottom:4px;">Continue where you left off</p>
        <h3 id="continue-name"></h3>
      </div>
      <div class="cc-arrow">&rarr;</div>
    </div>

    <p class="section-label">Your reports</p>
    <div id="report-grid"></div>
    <div id="empty-state" style="display:none;">No reports are assigned to your role yet — contact the Analytics team if this looks wrong.</div>
  </div>

  <div id="viewer">
    <div id="viewer-bar">
      <button id="back-btn">&larr; Back to reports</button>
      <div id="viewer-title"></div>
    </div>
    <div id="frame-wrap">
      <iframe id="report-iframe" title="Sundrop Lens report" src="" allowfullscreen></iframe>
    </div>
  </div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="logging.js"></script>
<script>
  var session = requireSession(); // redirects to index.html if no valid session
  if (session) {

    var PIN_KEY = 'sl_pins_' + session.email;
    var LAST_KEY = 'sl_last_' + session.email;

    document.getElementById('session-info').textContent = session.name + ' · ' + session.role;
    document.getElementById('welcome-title').textContent = 'Welcome back, ' + session.name.split(' ')[0];

    var myReports = reportsForSession(session);
    document.getElementById('welcome-sub').textContent =
      myReports.length + (myReports.length === 1 ? ' report available to you.' : ' reports available to you.');

    var grid = document.getElementById('report-grid');
    var landing = document.getElementById('landing');
    var viewer = document.getElementById('viewer');
    var iframe = document.getElementById('report-iframe');
    var viewerTitle = document.getElementById('viewer-title');
    var backBtn = document.getElementById('back-btn');
    var logoutBtn = document.getElementById('logout-btn');
    var continueCard = document.getElementById('continue-card');
    var continueName = document.getElementById('continue-name');

    function getPins() {
      try { return JSON.parse(localStorage.getItem(PIN_KEY)) || []; } catch (e) { return []; }
    }
    function setPins(pins) { localStorage.setItem(PIN_KEY, JSON.stringify(pins)); }

    function openReport(report) {
      localStorage.setItem(LAST_KEY, report.id);
      viewerTitle.textContent = report.name;
      iframe.src = report.url;
      landing.style.display = 'none';
      viewer.style.display = 'flex';
      logEvent('report_view', { reportId: report.id, reportName: report.name });
    }

    function initials(name) {
      return name.split(' ').map(function (w) { return w[0]; }).slice(0, 2).join('').toUpperCase();
    }

    function renderGrid() {
      grid.innerHTML = '';
      if (myReports.length === 0) {
        document.getElementById('empty-state').style.display = 'block';
        return;
      }
      var pins = getPins();
      // Pinned reports first — small nod to the endowment effect (user-curated
      // order), without reordering so much that it feels unpredictable.
      var ordered = myReports.slice().sort(function (a, b) {
        return (pins.indexOf(b.id) !== -1) - (pins.indexOf(a.id) !== -1);
      });

      ordered.forEach(function (report) {
        var isPinned = pins.indexOf(report.id) !== -1;
        var card = document.createElement('div');
        card.className = 'report-card';
        card.innerHTML =
          '<button class="pin-btn' + (isPinned ? ' pinned' : '') + '" title="Pin this report">&#9733;</button>' +
          '<div class="icon">' + initials(report.name) + '</div>' +
          '<h3>' + report.name + '</h3>' +
          '<p>' + report.description + '</p>';

        card.querySelector('.pin-btn').addEventListener('click', function (e) {
          e.stopPropagation();
          var current = getPins();
          var idx = current.indexOf(report.id);
          if (idx === -1) current.push(report.id); else current.splice(idx, 1);
          setPins(current);
          renderGrid();
        });

        card.addEventListener('click', function () { openReport(report); });
        grid.appendChild(card);
      });
    }

    // "Continue where you left off" — smart default, shown only if the
    // last-viewed report is still one this user has access to.
    var lastId = localStorage.getItem(LAST_KEY);
    var lastReport = myReports.find(function (r) { return r.id === lastId; });
    if (lastReport) {
      continueName.textContent = lastReport.name;
      continueCard.style.display = 'flex';
      continueCard.addEventListener('click', function () { openReport(lastReport); });
    }

    renderGrid();

    backBtn.addEventListener('click', function () {
      iframe.src = '';
      viewer.style.display = 'none';
      landing.style.display = 'block';
    });

    logoutBtn.addEventListener('click', function () {
      logEvent('logout');
      clearSession();
      window.location.href = 'index.html';
    });
  }
</script>

</body>
</html>
