<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sundrop Lens</title>
<style>
  :root {
    /* Approximated from Sundrop Brands' site + packaging — swap for exact
       hex values once sampled from the real logo asset. See README.md. */
    --sd-blue: #1B4DA1;
    --sd-blue-dark: #123870;
    --sd-yellow: #FFD200;
    --sd-orange: #F5A623;
    --text-dark: #222222;
    --text-muted: #6b6b6b;
    --white: #FFFFFF;
    --error: #C0392B;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Calibri, Arial, sans-serif;
    background: var(--white);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dark);
  }
  /* Soft warm wash behind the card — accent only, never behind text */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,210,0,0.16), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(245,166,35,0.14), transparent 45%);
    z-index: 0;
  }

  #login-card {
    position: relative;
    z-index: 1;
    background: var(--white);
    border: 1px solid #e6e6e6;
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 12px 40px rgba(27,77,161,0.12);
  }

  #logo-mark { display: flex; justify-content: center; margin-bottom: 18px; }

  #login-card h1 {
    font-size: 24px;
    margin: 0 0 4px;
    text-align: center;
    color: var(--sd-blue-dark);
  }
  #login-card p.subtitle {
    margin: 0 0 30px;
    font-size: 12.5px;
    color: var(--text-muted);
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  label { display: block; font-size: 12.5px; color: var(--text-muted); margin-bottom: 6px; }
  .field { margin-bottom: 16px; }
  #email-input, #password-wrap {
    width: 100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid #d8d8d8;
    background: #fafafa;
    font-size: 14.5px;
    color: var(--text-dark);
  }
  #email-input:focus { outline: none; border-color: var(--sd-blue); background: var(--white); }
  #password-wrap {
    display: flex; align-items: center; padding: 0;
  }
  #password-input {
    flex: 1; border: none; background: transparent; padding: 12px 14px;
    font-size: 14.5px; color: var(--text-dark); outline: none;
  }
  #password-wrap:focus-within { border-color: var(--sd-blue); background: var(--white); }
  #toggle-pw {
    background: none; border: none; color: var(--sd-blue); font-size: 12px;
    cursor: pointer; padding: 0 14px; font-weight: 600;
  }

  #login-btn {
    width: 100%; padding: 13px; border: none; border-radius: 8px;
    background: var(--sd-blue); color: var(--white); font-weight: 600; font-size: 15px;
    cursor: pointer; margin-top: 6px;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  #login-btn:hover:not(:disabled) { background: var(--sd-blue-dark); }
  #login-btn:active:not(:disabled) { transform: scale(0.98); }
  #login-btn:disabled { opacity: 0.55; cursor: not-allowed; }

  #error-msg { margin-top: 12px; font-size: 13px; color: var(--error); min-height: 18px; text-align: center; }
  #login-card .hint { margin-top: 22px; font-size: 11px; color: #9a9a9a; text-align: center; }
</style>
</head>
<body>

  <div id="login-card">
    <div id="logo-mark">
      <!-- Placeholder sun-drop mark in brand colors — swap for the real
           Sundrop logo asset (see README.md "Swapping in the real logo"). -->
      <svg width="52" height="52" viewBox="0 0 52 52" aria-label="Sundrop Lens">
        <circle cx="26" cy="26" r="14" fill="var(--sd-yellow)"/>
        <g stroke="var(--sd-orange)" stroke-width="2.5" stroke-linecap="round">
          <line x1="26" y1="2" x2="26" y2="9"/>
          <line x1="26" y1="43" x2="26" y2="50"/>
          <line x1="2" y1="26" x2="9" y2="26"/>
          <line x1="43" y1="26" x2="50" y2="26"/>
          <line x1="9.5" y1="9.5" x2="14.5" y2="14.5"/>
          <line x1="37.5" y1="37.5" x2="42.5" y2="42.5"/>
          <line x1="9.5" y1="42.5" x2="14.5" y2="37.5"/>
          <line x1="37.5" y1="14.5" x2="42.5" y2="9.5"/>
        </g>
        <path d="M26 16 C31 24 33 27 33 31 A7 7 0 0 1 19 31 C19 27 21 24 26 16 Z" fill="var(--sd-blue)"/>
      </svg>
    </div>
    <h1>Sundrop Lens</h1>
    <p class="subtitle">Sales &amp; Distribution Dashboards</p>

    <div class="field">
      <label for="email-input">Company email</label>
      <input type="email" id="email-input" placeholder="you@sundropbrands.com" autocomplete="username">
    </div>
    <div class="field">
      <label for="password-input">Password</label>
      <div id="password-wrap">
        <input type="password" id="password-input" placeholder="Enter password" autocomplete="current-password">
        <button type="button" id="toggle-pw">Show</button>
      </div>
    </div>

    <button id="login-btn">Continue</button>
    <div id="error-msg"></div>
    <div class="hint">Access restricted to Sundrop Brands employees</div>
  </div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="logging.js"></script>
<script>
  var emailInput = document.getElementById('email-input');
  var passwordInput = document.getElementById('password-input');
  var togglePw = document.getElementById('toggle-pw');
  var loginBtn = document.getElementById('login-btn');
  var errorMsg = document.getElementById('error-msg');

  togglePw.addEventListener('click', function () {
    var isPw = passwordInput.type === 'password';
    passwordInput.type = isPw ? 'text' : 'password';
    togglePw.textContent = isPw ? 'Hide' : 'Show';
  });

  var attempts = 0;

  function setLoading(isLoading) {
    loginBtn.disabled = isLoading;
    loginBtn.textContent = isLoading ? 'Checking…' : 'Continue';
  }

  function lockOut() {
    errorMsg.textContent = 'Too many attempts. Try again in 30s.';
    loginBtn.disabled = true;
    emailInput.disabled = true;
    passwordInput.disabled = true;
    setTimeout(function () {
      attempts = 0;
      loginBtn.disabled = false;
      emailInput.disabled = false;
      passwordInput.disabled = false;
      errorMsg.textContent = '';
      emailInput.focus();
    }, LOCK_MS);
  }

  async function tryLogin() {
    if (loginBtn.disabled) return;
    var email = emailInput.value.trim();
    var password = passwordInput.value;
    if (!email || !password) {
      errorMsg.textContent = 'Enter your email and password.';
      return;
    }

    setLoading(true);
    var user = await verifyCredentials(email, password);
    setLoading(false);

    if (user) {
      setSession(user);
      logEvent('login_success');
      window.location.href = 'dashboard.html';
    } else {
      logEvent('login_failed', { attemptedEmail: email });
      attempts++;
      passwordInput.value = '';
      if (attempts >= LOCK_AFTER_ATTEMPTS) {
        lockOut();
      } else {
        errorMsg.textContent = 'Incorrect email or password.';
        passwordInput.focus();
      }
    }
  }

  loginBtn.addEventListener('click', tryLogin);
  [emailInput, passwordInput].forEach(function (el) {
    el.addEventListener('keydown', function (e) { if (e.key === 'Enter') tryLogin(); });
  });

  if (new URLSearchParams(window.location.search).get('expired')) {
    errorMsg.textContent = 'Your session expired. Please log in again.';
  }

  if (hasValidSession()) {
    window.location.href = 'dashboard.html';
  }
</script>

</body>
</html>
